# =============================================================================
# Zync Platform – Local Dev Stack (Hybrid: Cloud + Docker rinhe)
#
# Chi chay nhung dich vu co free tier qua thap cho real-time app:
#
#   Redis    → local Docker  | Upstash chi 10K cmd/ngay, het trong vai gio dev
#   Kafka    → local Docker  | Upstash chi 10K msg/ngay + SASL phuc tap
#              (Redpanda – Kafka-compatible, khong can Zookeeper, ~150MB RAM)
#
# Cloud free tier (dang ky 1 lan, khong can Docker):
#   MongoDB  → Atlas M0       | upgrade M10+ khi production, URI khong doi
#   Storage  → Cloudflare R2  | 10GB/thang, S3-compatible
#   Email    → Resend         | 100/ngay + OTP_HARDCODE=true khi dev
#   Push     → FCM            | mien phi mai mai
#
# Tong RAM local: Redis ~5MB + Redpanda ~150MB ≈ 155MB
# Neu bat TURN local cho WebRTC call: +~30-50MB tuy load
#
# Khoi dong: docker compose -f infra/docker-compose.yml up -d
# Redpanda Console (UI): http://localhost:8080
# Kafka bootstrap (cho server): localhost:9092
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Redis 7 Alpine (~5MB RAM)
  # Dung local vi Upstash free tier chi 10K cmd/ngay – khong du cho real-time:
  # moi socket event tieu thu 3-5 cmd (presence, rate limit, cache, pub/sub)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: zync_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - zync_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redpanda (~150MB RAM) – Kafka-compatible, khong can Zookeeper
  # Thay the Kafka cluster (Kafka + ZK ngon 600MB+)
  # Kafka API 100% tuong thich – code kafkajs khong can sua
  # Dung local vi Upstash Kafka chi 10K msg/ngay va yeu cau SASL/SSL
  #
  # Kafka bootstrap cho server: KAFKA_BROKERS=localhost:9092
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: zync_redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "9092:9092"    # Kafka bootstrap (cung port cu, khong doi .env)
      - "18082:18082"  # HTTP Proxy
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - zync_net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redpanda Console – Web UI quan sat Kafka topics/messages
  # URL: http://localhost:8080
  # ---------------------------------------------------------------------------
  redpanda-console:
    image: redpandadata/console:latest
    container_name: zync_redpanda_console
    restart: unless-stopped
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    networks:
      - zync_net

  # ---------------------------------------------------------------------------
  # coturn – TURN server local cho WebRTC call (Milestone A)
  #
  # Mac dinh dung static credential tu .env:
  #   TURN_USERNAME / TURN_PASSWORD / TURN_REALM
  #
  # Luu y:
  # - Local dev cho phep no-tls/no-dtls de giam complexity
  # - Staging/production bat buoc turns + TLS certificate that
  # ---------------------------------------------------------------------------
  coturn:
    image: coturn/coturn:4.6.2-r1
    container_name: zync_coturn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/tcp"
      - "49160-49200:49160-49200/udp"
    command:
      - -n
      - --no-cli
      - --log-file=stdout
      - --fingerprint
      - --realm=${TURN_REALM:-zync.local}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --user=${TURN_USERNAME:-zync}:${TURN_PASSWORD:-zync123}
      - --no-tls
      - --no-dtls
    networks:
      - zync_net

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  zync_net:
    driver: bridge

volumes:
  redis_data:
  redpanda_data:
